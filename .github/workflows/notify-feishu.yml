name: Notify Feishu on PR

on:
  pull_request:
    types: [opened, closed, reopened]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send notification to Feishu
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: |
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_URL="${{ github.event.pull_request.html_url }}"
          PR_AUTHOR="${{ github.event.pull_request.user.login }}"
          PR_ACTION="${{ github.event.action }}"
          PR_NUMBER="${{ github.event.pull_request.number }}"
          
          # 构建飞书消息
          curl -X POST "$FEISHU_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{
              \"msg_type\": \"interactive\",
              \"card\": {
                \"header\": {
                  \"title\": {
                    \"tag\": \"plain_text\",
                    \"content\": \"GitHub PR 更新: ${PR_ACTION}\"
                  },
                  \"template\": \"${{ github.event.action == 'opened' && 'blue' || github.event.action == 'closed' && 'green' || 'red' }}\"
                },
                \"elements\": [
                  {
                    \"tag\": \"div\",
                    \"text\": {
                      \"tag\": \"lark_md\",
                      \"content\": \"**标题:** ${PR_TITLE}\\n**作者:** ${PR_AUTHOR}\\n**链接:** [PR #${PR_NUMBER}](${PR_URL})\"
                    }
                  }
                ]
              }
            }"
